<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Kvíz · Masmédia</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

<style>
:root {
  --bg:        #0b0f0e;
  --bg2:       #111714;
  --bg3:       #192019;
  --surface:   #1c2420;
  --border:    #2a352f;
  --accent:    #4ade80;
  --accent2:   #22c55e;
  --accent-dim:#193b27;
  --red:       #f87171;
  --red-dim:   #3b1515;
  --text:      #e8ede9;
  --text2:     #8fa899;
  --text3:     #4d6658;
  --serif:     'Playfair Display', Georgia, serif;
  --sans:      'DM Sans', system-ui, sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-size: 16px;
  min-height: 100%;
}

body {
  min-height: 100vh;
  background:
    radial-gradient(ellipse 80% 50% at 20% -10%, #0d2b1c 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 110%, #0a1f14 0%, transparent 60%),
    var(--bg);
}

/* ── LAYOUT ─────────────────────────────── */
#app {
  max-width: 520px;
  margin: 0 auto;
  padding: 2rem 1.25rem 4rem;
}

.screen { display: none; }
.screen.active { display: block; }

/* ── START SCREEN ────────────────────────── */
.hero {
  text-align: center;
  padding: 3rem 0 2rem;
  animation: fadeUp .6s ease both;
}

.hero-badge {
  display: inline-block;
  font-family: var(--sans);
  font-size: 10px;
  font-weight: 500;
  letter-spacing: .18em;
  text-transform: uppercase;
  color: var(--accent);
  border: 1px solid var(--accent-dim);
  background: rgba(74,222,128,.07);
  padding: 5px 14px;
  border-radius: 100px;
  margin-bottom: 1.5rem;
}

.hero h1 {
  font-family: var(--serif);
  font-size: 2.6rem;
  font-weight: 700;
  line-height: 1.15;
  color: var(--text);
  margin-bottom: .6rem;
  letter-spacing: -.02em;
}

.hero-sub {
  font-size: 14px;
  color: var(--text2);
  letter-spacing: .03em;
}

.name-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 1.5rem;
  margin-bottom: 1rem;
  animation: fadeUp .6s .1s ease both;
}

.name-card label {
  display: block;
  font-size: 10px;
  font-weight: 500;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: .6rem;
}

.name-card input {
  width: 100%;
  padding: .85rem 1.1rem;
  border-radius: 12px;
  border: 1px solid var(--border);
  background: var(--bg2);
  color: var(--text);
  font-size: 16px;
  font-family: var(--sans);
  outline: none;
  transition: border-color .2s, box-shadow .2s;
}
.name-card input::placeholder { color: var(--text3); }
.name-card input:focus {
  border-color: var(--accent2);
  box-shadow: 0 0 0 3px rgba(34,197,94,.12);
}
.name-card input.error {
  border-color: var(--red);
  box-shadow: 0 0 0 3px rgba(248,113,113,.18);
}
.name-error {
  font-size: 12px;
  color: var(--red);
  margin-top: .45rem;
  display: none;
}
.name-error.show { display: block; }

.info-row {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 8px;
  margin-bottom: 1.25rem;
  animation: fadeUp .6s .15s ease both;
}

.info-chip {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: .9rem .5rem;
  text-align: center;
}
.info-chip .ic-icon { font-size: 20px; margin-bottom: 5px; }
.info-chip .ic-text { font-size: 12px; color: var(--text2); line-height: 1.4; }

.start-btn {
  width: 100%;
  padding: 1.05rem;
  background: var(--accent);
  border: none;
  border-radius: 14px;
  font-size: 15px;
  font-weight: 500;
  font-family: var(--sans);
  color: #030a05;
  cursor: pointer;
  letter-spacing: .04em;
  transition: background .2s, transform .1s, box-shadow .2s;
  box-shadow: 0 0 0 0 rgba(74,222,128,0);
  animation: fadeUp .6s .2s ease both;
}
.start-btn:hover {
  background: #6ee7a0;
  box-shadow: 0 4px 24px rgba(74,222,128,.25);
}
.start-btn:active { transform: scale(.98); }

/* ── QUIZ SCREEN ─────────────────────────── */
.q-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 1.25rem;
}

.q-counter {
  font-size: 12px;
  font-weight: 500;
  color: var(--text3);
  white-space: nowrap;
  letter-spacing: .05em;
}

.q-progress {
  flex: 1;
  height: 3px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
}
.q-progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent2), var(--accent));
  border-radius: 2px;
  transition: width .45s cubic-bezier(.4,0,.2,1);
}

.q-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 1.75rem;
  animation: fadeUp .35s ease both;
}

.q-meta {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 1.1rem;
}

.q-topic-pill {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--accent);
  background: rgba(74,222,128,.1);
  border: 1px solid rgba(74,222,128,.2);
  padding: 4px 12px;
  border-radius: 100px;
}

.q-badge-pill {
  font-size: 11px;
  color: var(--text3);
  background: var(--bg3);
  border: 1px solid var(--border);
  padding: 4px 10px;
  border-radius: 100px;
}

.q-text {
  font-family: var(--serif);
  font-size: 1.35rem;
  font-weight: 500;
  color: var(--text);
  line-height: 1.55;
  margin-bottom: 1.5rem;
}

/* OPTIONS */
.opt {
  display: flex;
  align-items: flex-start;
  gap: 13px;
  width: 100%;
  text-align: left;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: .9rem 1.1rem;
  margin-bottom: .55rem;
  font-size: 14.5px;
  font-family: var(--sans);
  color: var(--text2);
  cursor: pointer;
  transition: background .15s, border-color .15s, transform .12s, color .15s;
}
.opt:hover:not(:disabled) {
  background: var(--bg3);
  border-color: var(--text3);
  color: var(--text);
  transform: translateX(3px);
}
.opt:active:not(:disabled) { transform: scale(.99); }
.opt:disabled { cursor: default; transform: none !important; }

.opt-letter {
  width: 28px;
  height: 28px;
  border-radius: 8px;
  background: var(--bg3);
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 500;
  color: var(--text3);
  flex-shrink: 0;
  transition: background .15s, color .15s, border-color .15s;
}
.opt-text { padding-top: 4px; line-height: 1.5; }

/* States */
.opt.correct {
  background: rgba(34,197,94,.1);
  border-color: rgba(34,197,94,.4);
  color: #86efac;
}
.opt.correct .opt-letter {
  background: var(--accent2);
  color: #030a05;
  border-color: var(--accent2);
}
.opt.wrong {
  background: rgba(248,113,113,.08);
  border-color: rgba(248,113,113,.35);
  color: #fca5a5;
}
.opt.wrong .opt-letter {
  background: #ef4444;
  color: #fff;
  border-color: #ef4444;
}
.opt.reveal-correct {
  background: rgba(34,197,94,.07);
  border-color: rgba(34,197,94,.25);
  color: #86efac;
  opacity: .7;
}
.opt.reveal-correct .opt-letter {
  background: var(--accent2);
  color: #030a05;
  border-color: var(--accent2);
}

/* FEEDBACK */
.feedback-box {
  margin-top: 1.1rem;
  padding: .8rem 1.1rem;
  border-radius: 12px;
  font-size: 13px;
  line-height: 1.55;
  display: none;
  border: 1px solid transparent;
}
.feedback-box.show { display: block; }
.feedback-box.ok {
  background: rgba(34,197,94,.08);
  border-color: rgba(34,197,94,.2);
  color: #86efac;
}
.feedback-box.fail {
  background: rgba(248,113,113,.08);
  border-color: rgba(248,113,113,.2);
  color: #fca5a5;
}

/* NEXT BTN */
.next-btn {
  width: 100%;
  margin-top: 1rem;
  padding: .9rem;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 12px;
  font-size: 14px;
  font-weight: 500;
  font-family: var(--sans);
  color: var(--text2);
  cursor: pointer;
  transition: background .15s, border-color .15s, color .15s;
  display: none;
  letter-spacing: .03em;
}
.next-btn:hover {
  background: var(--bg3);
  border-color: var(--text3);
  color: var(--text);
}

/* ── RESULTS ─────────────────────────────── */
.result-hero {
  background: linear-gradient(145deg, #112b1c 0%, #0a1f14 60%, #0b1a10 100%);
  border: 1px solid #2a4435;
  border-radius: 24px;
  padding: 2.5rem 2rem;
  text-align: center;
  margin-bottom: 1rem;
  position: relative;
  overflow: hidden;
}
.result-hero::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse 70% 60% at 50% 0%, rgba(74,222,128,.07) 0%, transparent 70%);
  pointer-events: none;
}

.rh-icon { font-size: 40px; margin-bottom: .75rem; }
.rh-name { font-size: 13px; color: var(--text2); margin-bottom: .3rem; letter-spacing: .05em; }
.rh-score {
  font-family: var(--serif);
  font-size: 3.8rem;
  font-weight: 700;
  color: var(--accent);
  line-height: 1;
  margin-bottom: .3rem;
  letter-spacing: -.02em;
}
.rh-sub { font-size: 12px; color: var(--text3); letter-spacing: .04em; }

.stats-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: .75rem;
}
.stat-tile {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 1.1rem 1.25rem;
}
.stat-tile .st-label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: .1em;
  color: var(--text3);
  margin-bottom: 7px;
}
.stat-tile .st-val {
  font-family: var(--serif);
  font-size: 1.9rem;
  font-weight: 700;
  color: var(--text);
}
.stat-tile .st-val.green { color: var(--accent); }
.stat-tile .st-val.red { color: var(--red); }

.msg-card {
  border-radius: 16px;
  padding: 1rem 1.25rem;
  font-size: 14px;
  line-height: 1.65;
  margin-bottom: .75rem;
  border: 1px solid transparent;
}
.msg-card.great {
  background: rgba(34,197,94,.08);
  border-color: rgba(34,197,94,.2);
  color: #86efac;
}
.msg-card.good {
  background: rgba(74,222,128,.06);
  border-color: rgba(74,222,128,.15);
  color: #a3e6be;
}
.msg-card.ok {
  background: rgba(234,179,8,.07);
  border-color: rgba(234,179,8,.2);
  color: #fde68a;
}
.msg-card.bad {
  background: rgba(248,113,113,.07);
  border-color: rgba(248,113,113,.2);
  color: #fca5a5;
}

.restart-btn {
  width: 100%;
  padding: .9rem;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 12px;
  font-size: 14px;
  font-family: var(--sans);
  color: var(--text3);
  cursor: pointer;
  letter-spacing: .03em;
  transition: background .15s, color .15s, border-color .15s;
}
.restart-btn:hover {
  background: var(--surface);
  border-color: var(--text3);
  color: var(--text2);
}

/* ── ANIMATIONS ──────────────────────────── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(18px); }
  to   { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>

<div id="app">

  <!-- START -->
  <div id="start-screen" class="screen active">
    <div class="hero">
      <div class="hero-badge">📺 Mediální gramotnost</div>
      <h1>Kvíz:<br>Masmédia</h1>
      <div class="hero-sub">Bulvár · Dezinformace · Reklama</div>
    </div>

    <div class="name-card">
      <label>Vaše jméno a příjmení</label>
      <input type="text" id="name-input" placeholder="Např. Jan Novák" autocomplete="off"
        oninput="this.classList.remove('error'); document.getElementById('name-error').classList.remove('show');" />
      <div class="name-error" id="name-error">⚠ Zadejte prosím své jméno před spuštěním kvízu.</div>
    </div>

    <div class="info-row">
      <div class="info-chip">
        <div class="ic-icon">✅</div>
        <div class="ic-text">ABCD výběr</div>
      </div>
      <div class="info-chip">
        <div class="ic-icon">📝</div>
        <div class="ic-text">15 otázek</div>
      </div>
      <div class="info-chip">
        <div class="ic-icon">🍀</div>
        <div class="ic-text">Hodně štěstí!</div>
      </div>
    </div>

    <button class="start-btn" onclick="startQuiz()">Začít kvíz →</button>
  </div>

  <!-- QUIZ -->
  <div id="quiz-screen" class="screen">
    <div class="q-header">
      <span class="q-counter"><span id="q-num">1</span> / 15</span>
      <div class="q-progress">
        <div class="q-progress-fill" id="q-fill" style="width:0%"></div>
      </div>
    </div>
    <div class="q-card">
      <div class="q-meta">
        <span class="q-topic-pill" id="q-topic"></span>
        <span class="q-badge-pill" id="q-badge"></span>
      </div>
      <div class="q-text" id="q-text"></div>
      <div id="opts"></div>
      <div class="feedback-box" id="feedback"></div>
      <button class="next-btn" id="next-btn" onclick="nextQuestion()"></button>
    </div>
  </div>

  <!-- RESULTS -->
  <div id="result-screen" class="screen">
    <div class="result-hero">
      <div class="rh-icon" id="rh-icon"></div>
      <div class="rh-name" id="rh-name"></div>
      <div class="rh-score" id="rh-score"></div>
      <div class="rh-sub" id="rh-sub"></div>
    </div>
    <div class="stats-grid">
      <div class="stat-tile">
        <div class="st-label">Správné</div>
        <div class="st-val green" id="st-correct"></div>
      </div>
      <div class="stat-tile">
        <div class="st-label">Čas</div>
        <div class="st-val" id="st-time"></div>
      </div>
      <div class="stat-tile">
        <div class="st-label">Špatné</div>
        <div class="st-val red" id="st-wrong"></div>
      </div>
      <div class="stat-tile">
        <div class="st-label">Úspěšnost</div>
        <div class="st-val" id="st-pct"></div>
      </div>
    </div>
    <div class="msg-card" id="msg-card"></div>
    <button class="restart-btn" onclick="restartQuiz()">⟳ Zkusit znovu</button>
  </div>

</div>

<script>
const Q = [
  {t:"Masmédia",b:"Základy",q:"Co jsou masmédia?",o:["Komunikační prostředky zaměřené na osobní výměnu informací mezi jednotlivci, například telefonáty","Institucionalizované prostředky veřejné komunikace, které oslovují široké a různorodé publikum, například televize, rozhlas","Nástroje určené výhradně pro vzdělávání, například školní informační systémy a učební materiály","Systémy sloužící k fyzickému přenosu zpráv a zásilek, například poštovní a logistické služby"],c:1,e:"Masmédia jsou určena širokému publiku – na rozdíl od osobní komunikace (telefon, dopis) oslovují tisíce až miliony lidí najednou."},
  {t:"Masmédia",b:"Příklady",q:"Které z níže uvedených patří mezi masmédia?",o:["Dopis příteli","Sociální sítě","Telefonní hovor","Osobní rozhovor"],c:1,e:"Sociální sítě jsou masmédia – sdělení šíří veřejně a hromadně, na rozdíl od dopisu, telefonu či osobního rozhovoru."},
  {t:"Reklama",b:"Cílová skupina",q:"Co je cílová skupina v reklamě?",o:["Skupina novinářů, kteří reklamu hodnotí","Konkrétní okruh lidí, na které je reklama zaměřena","Tým reklamní agentury","Státní orgán kontrolující reklamu"],c:1,e:"Reklamní sdělení se vždy tvoří s ohledem na konkrétní skupinu – například děti, sportovce nebo seniory."},
  {t:"Reklama",b:"Manipulace",q:"Jaký je hlavní cíl manipulativní reklamy?",o:["Informovat objektivně o vlastnostech produktu","Ovlivnit chování spotřebitele emočními apely","Ukázat nevýhody konkurence pravdivě","Vzdělávat veřejnost"],c:1,e:"Manipulativní reklama využívá emoce (strach, touhu, humor), aby přiměla spotřebitele ke koupi – ne aby ho informovala."},
  {t:"Reklama",b:"Kodex",q:"Co je Kodex reklamy?",o:["Zákon o DPH pro reklamní agentury","Soubor etických pravidel pro reklamní průmysl","Ceník reklamního prostoru","Technická norma pro výrobu reklam"],c:1,e:"Kodex reklamy vydává Rada pro reklamu – jde o dobrovolná etická pravidla, která chrání spotřebitele před klamavou reklamou."},
  {t:"Bulvár",b:"Definice",q:"Co je typickým znakem bulvárního média?",o:["Důraz na ověřené zdroje a věcnost","Šokující titulky, senzace a skandály","Odborné analýzy a statistiky","Dlouhé vědecké komentáře"],c:1,e:"Bulvár staví na emocích a senzaci – cílem je upoutat pozornost, ne informovat vyváženě."},
  {t:"Bulvár",b:"Jazyk",q:"Jaké jazykové prostředky jsou typické pro bulvární titulky?",o:["Odborná terminologie a věcný styl","Emotivní výrazy, zkratky, výkřičníky","Neutrální jazyk bez hodnotícího zabarvení","Latinské citáty a akademický styl"],c:1,e:"Bulvární titulky šokují a provokují – typické jsou výkřičníky, velká písmena a emotivní slova jako 'šok', 'tragédie', 'odhalení'."},
  {t:"Bulvár",b:"Srovnání",q:"Jaké barvy znázorňují senzaci a spěch?",o:["Modrá","Žlutá","Zelená","Červená"],c:3,e:"Červená je barva spojená s nebezpečím, naléhavostí a emocemi – bulvární média ji využívají k upoutání pozornosti a vyvolání pocitu spěchu."},
  {t:"Dezinformace",b:"Techniky",q:"Která je typická manipulativní technika v dezinformačních článcích?",o:["Citace odborných studií","Šokující titulky vyvolávající paniku","Vyvážené zastoupení obou stran","Odkaz na primární zdroje dat"],c:1,e:"Dezinformace záměrně vyvolávají paniku nebo strach, aby čtenář přestal kriticky myslet a sdílel obsah bez ověření."},
  {t:"Dezinformace",b:"Emoční apel",q:"Co je 'emoční apel' v dezinformacích?",o:["Vědecká metoda ověřování faktů","Snaha vyvolat strach, pobouření nebo nedůvěru","Grafická úprava článku","Forma novinářské etiky"],c:1,e:"Emoční apel obchází rozum – místo faktů pracuje se strachem nebo pobouřením, aby čtenář uvěřil bez ověření."},
  {t:"Dezinformace",b:"Konspirační narativ",q:"Co charakterizuje konspirační narativ?",o:["Transparentní uvádění zdrojů","Tvrzení, že 'pravdu tají elity'","Vědecky podložené hypotézy","Kritické srovnání více zdrojů"],c:1,e:"Konspirační teorie typicky tvrdí, že 'pravdu vládci skrývají' – to nelze vyvrátit, proto jsou tak přitažlivé a nebezpečné."},
  {t:"Dezinformace",b:"Absence důkazů",q:"Jak poznáme, že článek má absenci důkazů?",o:["Uvádí konkrétní studie a jmenované odborníky","Opírá se o anonymní odborníky a obecná tvrzení","Je publikován v tištěném médiu","Je kratší než 300 slov"],c:1,e:"Spolehlivý článek uvádí jméno autora, konkrétní zdroje a studie. 'Odborníci říkají…' bez jména je varovný signál."},
  {t:"Média a spol.",b:"Kritické myšlení",q:"Proč je důležité ověřovat informace z více zdrojů?",o:["Aby byl internet rychlejší","Protože každý zdroj může být zaujatý nebo nepřesný","Kvůli autorským právům","Protože noviny jsou vždy dražší"],c:1,e:"Žádný zdroj není dokonalý – každý může mít chybu nebo záměr. Více různých zdrojů snižuje riziko, že uvěříme nepravdě."},
  {t:"Média a spol.",b:"Digitální média",q:"Manfred Spitzer je znám svými názory na:",o:["Pozitivní vliv sociálních sítí na vzdělávání","Negativní vliv digitálních technologií na mozek a zdraví","Výhody e-learningu pro děti","Historii tisku v Evropě"],c:1,e:"Německý neurolog Spitzer varuje před 'digitální demencí' – nadměrné užívání obrazovek podle něj poškozuje paměť a soustředění."},
  {t:"Média a spol.",b:"Komunikace",q:"O jaký typ komunikace je ochuzena komunikace přes internet a média?",o:["Komunikace psaná","Neverbální komunikace (mimika, gesta, tón hlasu)","Komunikace jednosměrná","Formální komunikace"],c:1,e:"Přes internet nevidíme výraz tváře ani neslyšíme tón hlasu – chybí nám až 60–70 % informací, které přenáší neverbální komunikace."}
];

const L = ['A','B','C','D'];
const TOTAL = Q.length;
let cur = 0, score = 0, wrong = 0, t0 = 0, done = false;

function startQuiz() {
  const inp = document.getElementById('name-input');
  const err = document.getElementById('name-error');
  const n = inp.value.trim();
  if (!n) {
    inp.classList.add('error');
    err.classList.add('show');
    inp.focus();
    return;
  }
  inp.classList.remove('error');
  err.classList.remove('show');
  t0 = Date.now(); cur = 0; score = 0; wrong = 0; done = false; shuffled = [];
  document.getElementById('q-fill').style.width = '0%';
  document.getElementById('q-num').textContent = '1';
  show('quiz-screen'); render();
}

// Enter key spustí kvíz
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('name-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') startQuiz();
  });
});

function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// shuffled order for current question, rebuilt each render
let shuffled = [];

function render() {
  done = false;
  const q = Q[cur];
  document.getElementById('q-num').textContent = cur + 1;
  document.getElementById('q-fill').style.width = (cur / TOTAL * 100) + '%';
  document.getElementById('q-topic').textContent = q.t;
  document.getElementById('q-badge').textContent = q.b;
  document.getElementById('q-text').textContent = q.q;
  document.getElementById('feedback').className = 'feedback-box';
  const nb = document.getElementById('next-btn');
  nb.style.display = 'none';

  // Build shuffled index array [0,1,2,3] → random order
  shuffled = [0,1,2,3].sort(() => Math.random() - 0.5);

  const opts = document.getElementById('opts');
  opts.innerHTML = '';
  shuffled.forEach((origIdx, pos) => {
    const btn = document.createElement('button');
    btn.className = 'opt';
    btn.innerHTML = `<span class="opt-letter">${L[pos]}</span><span class="opt-text">${q.o[origIdx]}</span>`;
    btn.onclick = () => pick(origIdx);
    opts.appendChild(btn);
  });

  // re-trigger card animation (cross-browser safe)
  const card = document.querySelector('.q-card');
  card.style.animation = 'none';
  void card.offsetHeight; // force reflow
  card.style.animation = 'fadeUp .35s ease both';
}

function pick(origIdx) {
  if (done) return;
  done = true;
  const q = Q[cur];
  const btns = document.querySelectorAll('.opt');
  btns.forEach(b => b.disabled = true);
  const fb = document.getElementById('feedback');
  const correctPos = shuffled.indexOf(q.c);
  const clickedPos = shuffled.indexOf(origIdx);
  if (origIdx === q.c) {
    score++;
    btns[clickedPos].classList.add('correct');
    fb.innerHTML = '✓ Správně! <span style="opacity:.8;font-weight:300"> — ' + q.e + '</span>';
    fb.className = 'feedback-box show ok';
  } else {
    wrong++;
    btns[clickedPos].classList.add('wrong');
    btns[correctPos].classList.add('reveal-correct');
    fb.innerHTML = '✗ Špatně – správná odpověď: ' + L[correctPos] + ' — ' + q.o[q.c] + '<br><span style="opacity:.75;font-weight:300;font-size:13px"> 💡 ' + q.e + '</span>';
    fb.className = 'feedback-box show fail';
  }
  const nb = document.getElementById('next-btn');
  nb.style.display = 'block';
  nb.textContent = cur < TOTAL - 1 ? 'Další otázka →' : 'Zobrazit výsledky →';
}

function nextQuestion() {
  cur++;
  if (cur >= TOTAL) showResults(); else render();
}

function showResults() {
  const el = Math.round((Date.now() - t0) / 1000);
  const m = Math.floor(el / 60), s = el % 60;
  const ts = m > 0 ? m + 'm ' + s + 's' : s + 's';
  const pct = Math.round(score / TOTAL * 100);
  const name = document.getElementById('name-input').value.trim();
  let icon = score === TOTAL ? '🎉' : score >= 10 ? '🎓' : '🔁';
  document.getElementById('rh-icon').textContent = icon;
  document.getElementById('rh-name').textContent = name;
  document.getElementById('rh-score').textContent = score + ' / ' + TOTAL;
  document.getElementById('rh-sub').textContent = 'Čas: ' + ts + '  ·  Úspěšnost: ' + pct + '%';
  document.getElementById('st-correct').textContent = score;
  document.getElementById('st-time').textContent = ts;
  document.getElementById('st-wrong').textContent = wrong;
  document.getElementById('st-pct').textContent = pct + '%';
  const mc = document.getElementById('msg-card');
  if (score === TOTAL) { mc.className = 'msg-card great'; mc.textContent = '🎉 Perfektní skóre! Máš jedničku s hvězdičkou – látku ovládáš na výbornou!'; }
  else if (score >= 10) { mc.className = 'msg-card good'; mc.textContent = '👍 Ujde to! Pár věcí by chtělo zopakovat, ale základ máš pevný.'; }
  else { mc.className = 'msg-card bad'; mc.textContent = '🔁 Tohle budeš muset ještě zopakovat. Projdi si látku znovu a zkus to!'; }
  document.getElementById('q-fill').style.width = '100%';
  show('result-screen');
}

function restartQuiz() {
  const inp = document.getElementById('name-input');
  inp.value = '';
  inp.classList.remove('error');
  document.getElementById('name-error').classList.remove('show');
  document.getElementById('q-fill').style.width = '0%';
  document.getElementById('q-num').textContent = '1';
  cur = 0; score = 0; wrong = 0; done = false; shuffled = [];
  show('start-screen');
}
</script>
</body>
